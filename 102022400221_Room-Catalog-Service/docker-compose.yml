version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: room-catalog-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: room_catalog_db
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      IAE_API_KEY: KEY-MHS-292
      IAE_SSO_BASE_URL: https://iae-sso.virtualfri.id
      IAE_SSO_EMAIL: warga38@ktp.iae.id
      IAE_SSO_PASSWORD: KtpDigital2026!
      IAE_TEAM_ID: TEAM-11
    volumes:
      - .:/var/www
      - /var/www/vendor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - room-network

  db:
    image: mysql:8.0
    container_name: room-catalog-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: room_catalog_db
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - room-network

volumes:
  db_data:

networks:
  room-network:
    driver: bridge
